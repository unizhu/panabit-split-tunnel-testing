<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e9fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16b777;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8050;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5722;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc3300;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#f5f7fa" stroke="#e6e6e6" stroke-width="1"/>
  
  <!-- Main router/device icon in center -->
  <rect x="22" y="26" width="20" height="14" rx="2" fill="url(#grad1)"/>
  <circle cx="27" cy="33" r="1.5" fill="#fff"/>
  <circle cx="32" cy="33" r="1.5" fill="#fff"/>
  <circle cx="37" cy="33" r="1.5" fill="#fff"/>
  
  <!-- Top incoming arrow -->
  <path d="M32 6 L32 20 M27 14 L32 20 L37 14" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Split path left (green) -->
  <path d="M24 40 Q24 48 12 54" stroke="url(#grad2)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="10" cy="56" r="4" fill="url(#grad2)"/>
  <text x="10" y="58" font-size="5" fill="#fff" text-anchor="middle" font-weight="bold">1</text>
  
  <!-- Split path center (blue) -->
  <path d="M32 40 L32 52" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="32" cy="56" r="4" fill="url(#grad1)"/>
  <text x="32" y="58" font-size="5" fill="#fff" text-anchor="middle" font-weight="bold">2</text>
  
  <!-- Split path right (orange) -->
  <path d="M40 40 Q40 48 52 54" stroke="url(#grad3)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="54" cy="56" r="4" fill="url(#grad3)"/>
  <text x="54" y="58" font-size="5" fill="#fff" text-anchor="middle" font-weight="bold">3</text>
</svg>
